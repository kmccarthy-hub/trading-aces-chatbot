<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meadow Vet Care AI Assistant</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="chat-panel" aria-label="Meadow Vet Care AI assistant">
      <header class="chat-header">
        <div>
          <p class="eyebrow">Meadow Vet Care</p>
          <h1>AI Clinic Assistant</h1>
        </div>
        <div class="status-pill" id="connectionStatus">
          <span aria-hidden="true"></span>
          Gemini + live services
        </div>
      </header>

      <section class="quick-info" aria-label="Popular service questions">
        <button type="button" class="suggestion">What dog dental services are available?</button>
        <button type="button" class="suggestion">Do you have cat consultations this week?</button>
        <button type="button" class="suggestion">Which emergency services are listed?</button>
      </section>

      <section class="messages" id="messages" aria-live="polite">
        <article class="message assistant">
          <div class="avatar">MVC</div>
          <div class="bubble">
            Hi, I am the Meadow Vet Care AI assistant. I use Gemini and the live clinic services sheet to answer questions about listed services, species, prices, durations, appointment requirements, availability, slots, and special offers.
          </div>
        </article>
      </section>

      <form class="composer" id="chatForm">
        <label class="sr-only" for="userInput">Ask about Meadow Vet Care services</label>
        <input id="userInput" name="message" type="text" autocomplete="off" placeholder="Ask about Meadow Vet Care services..." required>
        <button type="submit" id="sendButton">Send</button>
      </form>
    </section>
  </main>

  <script src="script.js?v=meadow-vet-care-1"></script>
</body>
</html>
